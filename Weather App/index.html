<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Weather App</h1>
            <div class="toggles">
                <button id="unit-toggle" class="toggle-btn">°C</button>
                <button id="theme-toggle" class="toggle-btn"><i class="fas fa-moon"></i></button>
            </div>
        </header>
        <main>
            <div class="search-section">
                <input type="text" id="city-input" placeholder="Enter city name" autocomplete="off">
                <button id="search-btn" class="btn"><i class="fas fa-search"></i> Get Weather</button>
                <button id="location-btn" class="btn"><i class="fas fa-map-marker-alt"></i> Current Location</button>
            </div>
            <div id="loading" class="loading hidden">
                <div class="spinner"></div>
                <p>Loading weather data...</p>
            </div>
            <div id="error" class="error hidden">
                <i class="fas fa-exclamation-triangle"></i>
                <p id="error-message">City not found. Please try again.</p>
            </div>
            <div id="weather-card" class="weather-card hidden">
                <div class="weather-header">
                    <h2 id="city-name">City Name</h2>
                    <img id="weather-icon" src="" alt="Weather Icon">
                </div>
                <div class="weather-main">
                    <div class="temperature">
                        <span id="temp">25</span><span id="unit-display">°C</span>
                    </div>
                    <p id="condition">Sunny</p>
                </div>
                <div class="weather-details">
                    <div class="detail">
                        <i class="fas fa-tint"></i>
                        <span>Humidity: <span id="humidity">60%</span></span>
                    </div>
                    <div class="detail">
                        <i class="fas fa-wind"></i>
                        <span>Wind Speed: <span id="wind-speed">5 km/h</span></span>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
