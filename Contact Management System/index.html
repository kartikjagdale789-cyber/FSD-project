<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Management System</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Contact Management System</h1>
            <button id="darkModeToggle" class="toggle-btn">
                <i class="fas fa-moon"></i>
            </button>
        </header>

        <div class="form-container">
            <input type="text" id="nameInput" placeholder="Enter name" required>
            <input type="tel" id="phoneInput" placeholder="Enter phone number" required>
            <button id="addBtn" class="btn add-btn">
                <i class="fas fa-plus"></i> Add Contact
            </button>
        </div>

        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search contacts...">
            <i class="fas fa-search search-icon"></i>
        </div>

        <div id="contactsList" class="contacts-list">
            <!-- Contacts will be displayed here -->
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
