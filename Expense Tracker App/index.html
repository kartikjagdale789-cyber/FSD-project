<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <!-- Header with Dark Mode Toggle -->
        <header class="header">
            <div class="header-content">
                <h1><i class="fas fa-wallet"></i> Expense Tracker</h1>
                <button id="darkModeToggle" class="dark-mode-toggle" title="Toggle Dark Mode">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </header>

        <main class="main-content">
            <!-- Summary Cards Section -->
            <section class="summary-cards">
                <div class="card income-card">
                    <div class="card-header">
                        <h3>Total Income</h3>
                        <i class="fas fa-arrow-up"></i>
                    </div>
                    <p class="card-value" id="totalIncome">$0.00</p>
                </div>

                <div class="card expense-card">
                    <div class="card-header">
                        <h3>Total Expenses</h3>
                        <i class="fas fa-arrow-down"></i>
                    </div>
                    <p class="card-value" id="totalExpense">$0.00</p>
                </div>

                <div class="card balance-card">
                    <div class="card-header">
                        <h3>Total Balance</h3>
                        <i class="fas fa-balance-scale"></i>
                    </div>
                    <p class="card-value" id="totalBalance">$0.00</p>
                </div>
            </section>

            <div class="content-wrapper">
                <!-- Left Section: Input Form and Chart -->
                <section class="form-section">
                    <div class="form-card">
                        <h2>Add New Transaction</h2>
                        <form id="expenseForm" class="expense-form">
                            <div class="form-group">
                                <label for="expenseTitle">Title</label>
                                <input type="text" id="expenseTitle" placeholder="Enter expense title" required>
                            </div>

                            <div class="form-group">
                                <label for="expenseAmount">Amount</label>
                                <input type="number" id="expenseAmount" placeholder="Enter amount" step="0.01" required>
                            </div>

                            <div class="form-group">
                                <label for="expenseCategory">Category</label>
                                <select id="expenseCategory" required>
                                    <option value="">Select category</option>
                                    <option value="Income">Income</option>
                                    <option value="Food">Food</option>
                                    <option value="Travel">Travel</option>
                                    <option value="Shopping">Shopping</option>
                                    <option value="Entertainment">Entertainment</option>
                                    <option value="Utilities">Utilities</option>
                                    <option value="Healthcare">Healthcare</option>
                                    <option value="Education">Education</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label for="expenseDate">Date</label>
                                <input type="date" id="expenseDate" required>
                            </div>

                            <div class="form-group">
                                <label for="expenseType">Type</label>
                                <select id="expenseType" required>
                                    <option value="Expense">Expense</option>
                                    <option value="Income">Income</option>
                                </select>
                            </div>

                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-plus"></i> Add Transaction
                            </button>
                        </form>
                    </div>

                    <!-- Chart Section -->
                    <div class="chart-section">
                        <div class="chart-card">
                            <h2>Spending Distribution</h2>
                            <canvas id="categoryChart"></canvas>
                        </div>

                        <div class="chart-card">
                            <h2>Monthly Summary</h2>
                            <canvas id="monthlyChart"></canvas>
                        </div>
                    </div>
                </section>

                <!-- Right Section: Expenses List -->
                <section class="list-section">
                    <div class="list-header">
                        <h2>Transactions</h2>
                        <div class="filter-controls">
                            <select id="categoryFilter" class="filter-select">
                                <option value="">All Categories</option>
                                <option value="Income">Income</option>
                                <option value="Food">Food</option>
                                <option value="Travel">Travel</option>
                                <option value="Shopping">Shopping</option>
                                <option value="Entertainment">Entertainment</option>
                                <option value="Utilities">Utilities</option>
                                <option value="Healthcare">Healthcare</option>
                                <option value="Education">Education</option>
                                <option value="Other">Other</option>
                            </select>

                            <select id="sortSelect" class="filter-select">
                                <option value="latest">Latest First</option>
                                <option value="oldest">Oldest First</option>
                                <option value="highest">Highest Amount</option>
                                <option value="lowest">Lowest Amount</option>
                            </select>

                            <button id="clearAllBtn" class="btn btn-danger-light">
                                <i class="fas fa-trash"></i> Clear All
                            </button>
                        </div>
                    </div>

                    <div id="expensesList" class="expenses-list">
                        <!-- Expenses will be dynamically inserted here -->
                    </div>
                </section>
            </div>
        </main>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Edit Transaction</h2>
            <form id="editForm" class="expense-form">
                <input type="hidden" id="editId">
                <div class="form-group">
                    <label for="editTitle">Title</label>
                    <input type="text" id="editTitle" required>
                </div>
                <div class="form-group">
                    <label for="editAmount">Amount</label>
                    <input type="number" id="editAmount" step="0.01" required>
                </div>
                <div class="form-group">
                    <label for="editCategory">Category</label>
                    <select id="editCategory" required>
                        <option value="Income">Income</option>
                        <option value="Food">Food</option>
                        <option value="Travel">Travel</option>
                        <option value="Shopping">Shopping</option>
                        <option value="Entertainment">Entertainment</option>
                        <option value="Utilities">Utilities</option>
                        <option value="Healthcare">Healthcare</option>
                        <option value="Education">Education</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="editDate">Date</label>
                    <input type="date" id="editDate" required>
                </div>
                <div class="form-group">
                    <label for="editType">Type</label>
                    <select id="editType" required>
                        <option value="Expense">Expense</option>
                        <option value="Income">Income</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary">Update Transaction</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
